<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript no Head 
    </title><script>
        function minhaFunc(){
           document.getElementById("demo").innerHTML = "o parágrafo mudou.";
        }

</head>
<body>
    <h2>JavaScript no head</h2>
    <p id="demo">Este é um paragrafo.</p>

<button type="button" onclick="minhaFunc()">Clique aqui</button>

</body>
</html>
